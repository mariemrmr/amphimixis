name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    
jobs:
  linters-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-local-path: .uv-cache
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          sudo apt update && sudo apt install -y ruby-mdl
          if ! perf --version; then
              sudo apt-get install -y linux-tools-azure 
              export PERF_PATH=$(find -L /usr/lib/linux-tools/ -name perf -type f | head -n 1)
              if [ -n "$PERF_PATH" ]; then
                  sudo ln -sf "$PERF_PATH" /usr/bin/perf
              fi
          fi

          if [ ! -f /usr/libexec/perf-core/perf-archive ]; then
              sudo mkdir -p /usr/libexec/perf-core
              curl -s https://raw.githubusercontent.com/torvalds/linux/master/tools/perf/perf-archive.sh | sudo tee /usr/libexec/perf-core/perf-archive
              sudo chmod +x /usr/libexec/perf-core/perf-archive
          fi
          perf --version
      - name: Run linters
        run: |
          shellcheck ci/*.sh
          ci/mdl.sh
          ci/black.sh
          ci/mypy.sh
          ci/pylint.sh
          ci/ruff.sh
      - name: Run unit tests
        run: |
          echo '-1' | sudo tee /proc/sys/kernel/perf_event_paranoid
          uv run pytest -m unit

  integration-tests-docker:
    needs: linters-and-unit
    runs-on: ubuntu-latest
    steps:
      - name: Install perf
        run: |
          if ! perf --version; then
              sudo apt update && sudo apt-get install -y linux-tools-azure 
              export PERF_PATH=$(find -L /usr/lib/linux-tools/ -name perf -type f | head -n 1)
              if [ -n "$PERF_PATH" ]; then
                  sudo ln -sf "$PERF_PATH" /usr/bin/perf
              fi
          fi

          if [ ! -f /usr/libexec/perf-core/perf-archive ]; then
              sudo mkdir -p /usr/libexec/perf-core
              curl -s https://raw.githubusercontent.com/torvalds/linux/master/tools/perf/perf-archive.sh | sudo tee /usr/libexec/perf-core/perf-archive
              sudo chmod +x /usr/libexec/perf-core/perf-archive
          fi
          perf --version
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-local-path: .uv-cache
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Run docker integration tests
        run: |
          echo '-1' | sudo tee /proc/sys/kernel/perf_event_paranoid
          uv run pytest -m integration -k docker
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test_workspaces-integration-docker
          include-hidden-files: true
          path: |
            /tmp/test_workspace_*

  integration-tests-local:
    needs: linters-and-unit
    runs-on: ubuntu-latest
    steps:
      - name: Install perf
        run: |
          if ! perf --version; then
              sudo apt update && sudo apt-get install -y linux-tools-azure
              export PERF_PATH=$(find -L /usr/lib/linux-tools/ -name perf -type f | head -n 1)
              if [ -n "$PERF_PATH" ]; then
                  sudo ln -sf "$PERF_PATH" /usr/bin/perf
              fi
          fi

          if [ ! -f /usr/libexec/perf-core/perf-archive ]; then
              sudo mkdir -p /usr/libexec/perf-core
              curl -s https://raw.githubusercontent.com/torvalds/linux/master/tools/perf/perf-archive.sh | sudo tee /usr/libexec/perf-core/perf-archive
              sudo chmod +x /usr/libexec/perf-core/perf-archive
          fi
          perf --version
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-local-path: .uv-cache
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Run local integration tests
        run: |
          echo '-1' | sudo tee /proc/sys/kernel/perf_event_paranoid
          uv run pytest -m integration -k local
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test_workspaces-integration-local
          include-hidden-files: true
          path: |
            /tmp/test_workspace_*

  integration-tests-riscv:
    needs: linters-and-unit
    runs-on: ubuntu-latest
    steps:
      - name: Install perf
        run: |
          sudo apt update && sudo apt install -y qemu-system qemu-utils sshpass wget unzip
          if ! perf --version; then
              sudo apt update && sudo apt-get install -y linux-tools-azure 
              export PERF_PATH=$(find -L /usr/lib/linux-tools/ -name perf -type f | head -n 1)
              if [ -n "$PERF_PATH" ]; then
                  sudo ln -sf "$PERF_PATH" /usr/bin/perf
              fi
          fi

          if [ ! -f /usr/libexec/perf-core/perf-archive ]; then
              sudo mkdir -p /usr/libexec/perf-core
              curl -s https://raw.githubusercontent.com/torvalds/linux/master/tools/perf/perf-archive.sh | sudo tee /usr/libexec/perf-core/perf-archive
              sudo chmod +x /usr/libexec/perf-core/perf-archive
          fi
          perf --version
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-local-path: .uv-cache
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Run integration tests for RISC-V
        run: |
          echo '-1' | sudo tee /proc/sys/kernel/perf_event_paranoid
          uv run pytest -m integration -k riscv
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test_workspaces-integration-riscv
          include-hidden-files: true
          path: |
            /tmp/test_workspace_*
